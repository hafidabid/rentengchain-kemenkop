# Frontend container nginx: serve the SPA, route unknown paths to index.html.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets can be cached hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for client-side routes (/, /laman-pengurus, /login, ...).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
