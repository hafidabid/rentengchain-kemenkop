schema: spec-driven

context: |
  RantaiRenteng — a digital tanggung renteng (social-collateral) microfinance app
  for a koperasi. Hackathon demo: a convincing end-to-end happy-path demo, speed over
  hardening. Requirements source of truth: brainstorm/claude0.md (wins over the older
  brainstorm/gstudio/CLAUDE_PLAN.md technical draft on any conflict).

  Two surfaces:
    - Anggota (Member): mobile-first, route "/".
    - Pengurus (Admin): desktop dashboard, route "/laman-pengurus".

  Stack:
    - Frontend: React + Vite + TypeScript + Tailwind (from brainstorm/gstudio mockup).
      Icons: lucide-react. Warm Coral aesthetic: #F06A6A / #E5544F / #FAF9F8 / #1E1F21.
    - Backend: NestJS + PostgreSQL + Prisma (chosen ORM) + viem + @google/genai + S3.
    - DB stays snake_case; a mapping layer serves the mockup's camelCase (no_hp <-> noHp).

  Web3 model (RESOLVED):
    - Real testnet: Base Sepolia (chain id 84532). RPC https://sepolia.base.org.
    - Contracts ALREADY DEPLOYED (foundry/), TRACKING-ONLY ledger — they never custody
      or transfer funds. Rupiah amounts are immutable accounting records; QRIS/cash
      settle off-chain. The backend relayer calls contract methods -> each is a real
      testnet tx with a clickable explorer link. Addresses:
        RRParticipationToken    0x1EDf5e51cFc99123cE2e98Ee9cdEA18C072dd48C
        RRLoanPosition          0x49D82FeDEbB676517D0FB8cA3810a0fD1654B650
        TanggungRentengEscrow   0x199812B240bf8d90dBAfB5C7E2ab79e3fAf728dE
    - One custodial wallet per member (their on-chain identity), generated by the backend
      on KYC approval. A master/relayer account holds gas and signs every tx; members
      never hold keys or gas. Encrypted private key stored in an env-encryptable column.
    - PRIVACY RULE: on-chain you submit ONLY salted hashes (memberHash, groupId,
      inviteCodeHash, reasonHash, paramsHash) computed with a per-coop secret salt.
      Never submit raw NIK, name, phone, address, KTP, invite code, or appeal text.

  Escrow contract method surface (TanggungRentengEscrow): registerMember, registerGroup,
  joinGroup, recordSavings, fundSocialFund, createLoan, recordScreening, approveLoan,
  disburseLoan, deferLoan, recordRepayment, markHardship, clearHardship, applySocialFund,
  restructure, activateRenteng, repayTalangan, applySanction, fileAppeal, resolveAppeal.
  Role model: RELAYER_ROLE (backend) records savings/repay/disburse; KOPERASI_ROLE
  approves/defers/screens/appeals; ADMIN_ROLE pauses.

  Auth: seeded accounts + JWT + a role flag (Anggota vs Pengurus). `peran`
  (penabung|peminjam|keduanya) stays a business attribute, NOT an auth role. Passwords
  hashed (Argon2/bcrypt).

  Gemini EWS: real @google/genai call, current model IDs. Structured JSON output:
  skor_ai (0-100), flag_ai (HIJAU|KUNING|MERAH), flag_alasan (string[]). Ani has a
  seeded fallback result so a flaky network can't break the demo.

  Seed personas: Sri (healthy/Lancar, HIJAU), Deni (bailed-out/Ditalangi, KUNING),
  Ani (red-flag/MERAH + sanggah), Ira (KYC Requested, for onboarding flow).

  Out of scope this phase: PDP-law/PII-at-rest compliance, social-media sentiment,
  payment reconciliation, interest/jasa math (use flat seeded cicilan_bulanan), deep
  e-RAT/neraca reporting, full collection-ladder automation, hardened key custody
  (KMS/HSM), rate limiting, exhaustive edge cases.

rules:
  proposal:
    - Keep proposals tight and demo-focused; happy-path only, edge cases stay shallow.
    - Always ground capability behavior in one of the four demo-critical flows or the shared foundation.
  tasks:
    - Each task should be independently checkable; note build/lint/test gates per flow.
    - Prefer real integrations over mocks, but keep a seeded fallback where the demo is fragile.
